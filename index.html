<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>nVision AI · Variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0a;
    --bar: #111;
    --bar-border: #222;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #ff6b35;
    --tab-bg: transparent;
    --tab-hover: #1a1a1a;
    --tab-active: #ff6b35;
    --tab-active-text: #fff;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Heebo', system-ui, -apple-system, sans-serif; overflow: hidden; }
  .tabbar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: var(--bar); border-bottom: 1px solid var(--bar-border);
    display: flex; align-items: stretch; padding: 0 16px; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 0 18px 0 8px; margin-left: 8px;
    border-left: 1px solid var(--bar-border);
    font-family: 'Instrument Serif', serif; font-size: 20px; letter-spacing: 0.5px; color: var(--text);
  }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .tabs { display: flex; align-items: stretch; gap: 4px; flex: 1; overflow-x: auto; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    appearance: none; border: 0; background: var(--tab-bg); color: var(--muted);
    font-family: inherit; font-size: 14px; font-weight: 500;
    padding: 0 18px; height: 100%; cursor: pointer; white-space: nowrap;
    border-radius: 0; position: relative;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .tab:hover { color: var(--text); background: var(--tab-hover); }
  .tab[aria-selected="true"] { color: var(--tab-active-text); }
  .tab[aria-selected="true"]::after {
    content: ""; position: absolute; left: 12px; right: 12px; bottom: 0; height: 3px;
    background: var(--tab-active); border-radius: 2px 2px 0 0;
  }
  .tab .key {
    display: inline-block; width: 22px; height: 22px; line-height: 22px; text-align: center;
    background: #1f1f1f; color: var(--accent); border-radius: 6px; margin-left: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
  }
  .tab[aria-selected="true"] .key { background: var(--accent); color: #fff; }
  .frame-wrap { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }
  iframe { width: 100%; height: 100%; border: 0; display: block; background: #000; }
  .hint { color: var(--muted); font-size: 12px; padding: 0 12px; align-self: center; }
  @media (max-width: 720px) {
    .brand { display: none; }
    .tab { padding: 0 12px; font-size: 13px; }
    .tab .key { display: none; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<nav class="tabbar" role="tablist" aria-label="Variations">
  <div class="brand"><span class="dot"></span><span>nVision AI</span></div>
  <div class="tabs" id="tabs"></div>
  <div class="hint">לחץ A · B · C · D · E להחלפה</div>
</nav>
<div class="frame-wrap">
  <iframe id="frame" title="Variation" allow="clipboard-write; clipboard-read"></iframe>
</div>
<script>
  const variations = [
    { key: "A", name: "A - Bento Editorial",      path: "A - Bento Editorial/" },
    { key: "B", name: "B - Infinite Mosaic",      path: "B - Infinite Mosaic/" },
    { key: "C", name: "C - Newsroom Chat",        path: "C - Newsroom Chat/" },
    { key: "D", name: "D - Strategist Workbench", path: "D - Strategist Workbench/" },
    { key: "E", name: "E - Newsroom Workbench",   path: "E - Newsroom Workbench/" },
  ];
  const DEFAULT_KEY = "E";
  const tabsEl = document.getElementById("tabs");
  const frame  = document.getElementById("frame");

  function readHashKey() {
    const h = (location.hash || "").replace(/^#\/?/, "").trim().toUpperCase();
    return variations.find(v => v.key === h)?.key || null;
  }
  function activate(key, push) {
    const v = variations.find(x => x.key === key) || variations.find(x => x.key === DEFAULT_KEY);
    document.title = "nVision AI · " + v.name;
    frame.src = encodeURI(v.path);
    [...tabsEl.children].forEach(btn => {
      btn.setAttribute("aria-selected", btn.dataset.key === v.key ? "true" : "false");
    });
    if (push) history.replaceState(null, "", "#/" + v.key);
  }
  variations.forEach(v => {
    const btn = document.createElement("button");
    btn.className = "tab";
    btn.role = "tab";
    btn.dataset.key = v.key;
    btn.setAttribute("aria-selected", "false");
    btn.innerHTML = '<span>' + v.name + '</span><span class="key">' + v.key + '</span>';
    btn.addEventListener("click", () => activate(v.key, true));
    tabsEl.appendChild(btn);
  });
  window.addEventListener("hashchange", () => {
    const k = readHashKey();
    if (k) activate(k, false);
  });
  window.addEventListener("keydown", e => {
    if (e.target && /^(input|textarea|select)$/i.test(e.target.tagName)) return;
    if (e.altKey || e.ctrlKey || e.metaKey) return;
    const k = (e.key || "").toUpperCase();
    if (["A","B","C","D","E"].includes(k)) {
      activate(k, true);
      e.preventDefault();
    }
  });
  activate(readHashKey() || DEFAULT_KEY, true);
</script>
</body>
</html>

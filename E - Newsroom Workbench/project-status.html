<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>nVision Digital · Project Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="v5-styles.css"/>
<link rel="stylesheet" href="v5-editor.css"/>
<style>
/* ---- Project Status Page — scoped rules ---- */
.ps-root {
  background: var(--v5-paper);
  color: var(--v5-ink);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
}
.ps-hero {
  padding: 64px 40px 48px;
  border-bottom: 1.5px solid var(--v5-ink);
  background: var(--v5-paper);
  position: relative;
  overflow: hidden;
}
.ps-hero-bg {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(to right,  var(--v5-grid, #d6cfba) 1px, transparent 1px),
    linear-gradient(to bottom, var(--v5-grid, #d6cfba) 1px, transparent 1px);
  background-size: 64px 64px;
  opacity: 0.3;
}
.ps-hero-inner { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; text-align: center; }
.ps-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.22em; font-weight: 700;
  color: var(--v5-sage); text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-bottom: 20px;
}
.ps-eyebrow::before, .ps-eyebrow::after {
  content: ''; flex: 0 0 48px; height: 1px; background: var(--v5-sage);
}
.ps-hero h1 {
  font-size: clamp(42px, 7vw, 88px);
  font-weight: 900; letter-spacing: -0.04em;
  line-height: 0.9; margin: 0 0 16px;
}
.ps-hero h1 .serif {
  font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
  color: var(--v5-cobalt); font-size: 1.05em;
}
.ps-hero-sub {
  font-size: 15px; color: var(--v5-dim); letter-spacing: 0.01em;
  margin-top: 12px;
}
.ps-live-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--v5-ink); color: var(--v5-paper);
  padding: 7px 18px; font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; margin-top: 22px;
  box-shadow: 4px 5px 0 var(--v5-sage);
}
.ps-live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--v5-acid); animation: v5pulse 1.6s infinite;
}
/* ---- Tab strip ---- */
.ps-tab-strip {
  position: sticky; top: 0; z-index: 60;
  display: flex; gap: 0;
  border-bottom: 1.5px solid var(--v5-ink);
  background: rgba(244,240,232,0.94);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  overflow-x: auto;
  scrollbar-width: none;
}
.ps-tab-strip::-webkit-scrollbar { display: none; }
.ps-tab {
  padding: 14px 22px;
  font-size: 12.5px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  border: none; background: transparent;
  border-bottom: 2.5px solid transparent;
  color: var(--v5-dim);
  transition: color 0.18s, border-color 0.18s;
  font-family: 'Heebo', sans-serif;
}
.ps-tab:hover { color: var(--v5-ink); }
.ps-tab.active {
  color: var(--v5-ink); border-bottom-color: var(--v5-cobalt); font-weight: 700;
}
.ps-tab .mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.12em;
  color: var(--v5-faint); margin-inline-start: 6px;
}
/* ---- Content area ---- */
.ps-content { max-width: 980px; margin: 0 auto; padding: 40px 32px 80px; }
/* ---- Cards ---- */
.ps-card {
  background: var(--v5-paper);
  border: 1.5px solid var(--v5-ink);
  padding: 22px 24px;
  box-shadow: 5px 6px 0 var(--v5-ink);
  margin-bottom: 20px;
}
.ps-card-sm {
  border: 1px solid var(--v5-line-2, rgba(17,17,13,0.18));
  padding: 16px 18px;
  margin-bottom: 14px;
}
.ps-card h3 {
  font-size: 14px; font-weight: 700; margin: 0 0 8px;
  letter-spacing: -0.01em;
}
.ps-card h3 .mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.06em;
  color: var(--v5-dim); margin-inline-start: 8px; font-weight: 400;
}
/* ---- Stats grid ---- */
.ps-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px; margin-bottom: 32px;
}
.ps-stat {
  border: 1.5px solid var(--v5-ink);
  padding: 18px 16px;
  box-shadow: 4px 4px 0 var(--v5-ink);
}
.ps-stat-n {
  font-size: 42px; font-weight: 900; letter-spacing: -0.04em;
  line-height: 1; margin-bottom: 4px;
}
.ps-stat-l { font-size: 11px; color: var(--v5-dim); font-weight: 500; }
/* ---- Timeline ---- */
.ps-timeline { list-style: none; padding: 0; margin: 0 0 28px; }
.ps-timeline li {
  display: flex; gap: 16px; align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
}
.ps-timeline li:last-child { border-bottom: none; }
.ps-timeline-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--v5-dim); letter-spacing: 0.06em;
  white-space: nowrap; padding-top: 2px; min-width: 72px;
}
.ps-timeline-text { font-size: 13.5px; line-height: 1.5; }
/* ---- Checklist ---- */
.ps-check { list-style: none; padding: 0; margin: 0; }
.ps-check li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13.5px; padding: 6px 0;
  border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
  line-height: 1.5;
}
.ps-check li:last-child { border-bottom: none; }
.ps-check-icon {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; flex-shrink: 0; padding-top: 3px;
  color: var(--v5-sage); min-width: 16px;
}
/* ---- Block catalog ---- */
.ps-block-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.ps-block-item {
  border: 1px solid var(--v5-line-2, rgba(17,17,13,0.18));
  padding: 14px 14px 12px;
}
.ps-block-item-icon {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; margin-bottom: 8px; display: block;
  color: var(--v5-cobalt);
}
.ps-block-item-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.1em;
  color: var(--v5-dim); margin-bottom: 4px;
}
.ps-block-item-label { font-size: 12.5px; font-weight: 700; margin-bottom: 4px; }
.ps-block-item-desc { font-size: 11.5px; color: var(--v5-dim); line-height: 1.45; }
/* ---- Architecture boxes ---- */
.ps-arch {
  display: flex; flex-direction: row; align-items: center;
  gap: 0; flex-wrap: wrap; margin-bottom: 28px;
  direction: ltr;
}
.ps-arch-node {
  border: 1.5px solid var(--v5-ink);
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  background: var(--v5-paper);
  white-space: nowrap;
}
.ps-arch-arrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px; color: var(--v5-cobalt); padding: 0 4px;
}
/* ---- Functions table ---- */
.ps-fn-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
.ps-fn-table th {
  text-align: right; font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
  color: var(--v5-dim); padding: 8px 12px;
  border-bottom: 1.5px solid var(--v5-ink);
}
.ps-fn-table td {
  padding: 10px 12px; font-size: 12.5px;
  border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
}
.ps-fn-table td .mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.04em;
}
/* ---- Roadmap groups ---- */
.ps-rm-group { margin-bottom: 32px; }
.ps-rm-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.2em; font-weight: 700;
  text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.ps-rm-label::after {
  content: ''; flex: 1; height: 1px; background: var(--v5-line-2, rgba(17,17,13,0.18));
}
.ps-rm-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.ps-rm-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; margin-bottom: 8px;
  border: 1px solid var(--v5-line-2, rgba(17,17,13,0.18));
}
.ps-rm-item-icon { font-size: 14px; flex-shrink: 0; padding-top: 1px; }
.ps-rm-item-body { flex: 1; min-width: 0; }
.ps-rm-item-title { font-size: 13.5px; font-weight: 700; margin-bottom: 2px; }
.ps-rm-item-desc { font-size: 12px; color: var(--v5-dim); line-height: 1.5; }
/* ---- Commands table ---- */
.ps-cmd-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
.ps-cmd-table th {
  text-align: right; font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
  color: var(--v5-dim); padding: 8px 12px;
  border-bottom: 1.5px solid var(--v5-ink);
}
.ps-cmd-table td {
  padding: 10px 12px; font-size: 12.5px;
  border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
  vertical-align: top;
}
.ps-cmd-table td .mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.04em;
}
/* ---- Warning callout ---- */
.ps-warn {
  border: 2px solid var(--v5-rose);
  background: rgba(211,171,199,0.12);
  padding: 14px 18px; margin-bottom: 24px;
  font-size: 13px; line-height: 1.6;
}
.ps-warn .ps-warn-head {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--v5-rose); margin-bottom: 6px;
}
/* ---- Two-col lookup ---- */
.ps-lookup { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
.ps-lookup th {
  text-align: right; font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
  color: var(--v5-dim); padding: 8px 12px;
  border-bottom: 1.5px solid var(--v5-ink);
}
.ps-lookup td {
  padding: 9px 12px; font-size: 12.5px;
  border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
  vertical-align: top;
}
.ps-lookup td:first-child { width: 38%; }
/* ---- Env-var table ---- */
.ps-env-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
.ps-env-table th {
  text-align: right; font-size: 10.5px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
  color: var(--v5-dim); padding: 8px 12px;
  border-bottom: 1.5px solid var(--v5-ink);
}
.ps-env-table td {
  padding: 8px 12px; font-size: 12px;
  border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
  vertical-align: top;
}
.ps-env-secret {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  padding: 1px 6px; letter-spacing: 0.06em;
  background: rgba(211,171,199,0.18); color: var(--v5-rose);
}
.ps-env-plain {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  padding: 1px 6px; letter-spacing: 0.06em;
  background: rgba(136,168,132,0.18); color: var(--v5-sage);
}
/* ---- Keyboard shortcuts ---- */
.ps-kbd-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
  font-size: 13px;
}
.ps-kbd-row:last-child { border-bottom: none; }
kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.04em;
  background: var(--v5-ink); color: var(--v5-paper);
  padding: 2px 7px; border-radius: 4px;
  display: inline-block;
}
/* ---- Section headings ---- */
.ps-section-head {
  font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
  font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
  color: var(--v5-dim); margin: 0 0 16px;
  display: flex; align-items: center; gap: 10px;
}
.ps-section-head::after { content: ''; flex: 1; height: 1px; background: var(--v5-line-2, rgba(17,17,13,0.18)); }
.ps-h2 {
  font-size: 22px; font-weight: 900; letter-spacing: -0.03em;
  margin: 0 0 20px;
}
.ps-h2 .serif {
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-weight: 400; color: var(--v5-cobalt);
}
.ps-big-status {
  display: flex; align-items: center; gap: 12px;
  font-size: clamp(28px, 5vw, 52px); font-weight: 900; letter-spacing: -0.04em;
  margin-bottom: 28px; padding: 22px 28px;
  border: 1.5px solid var(--v5-ink);
  box-shadow: 6px 7px 0 var(--v5-sage);
}
.ps-big-status-check {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--v5-sage); display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
  color: var(--v5-paper);
}
.ps-next-bullets { list-style: none; padding: 0; margin: 0; }
.ps-next-bullets li {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--v5-line, rgba(17,17,13,0.10));
  font-size: 13.5px; line-height: 1.5;
}
.ps-next-bullets li:last-child { border-bottom: none; }
.ps-next-n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; color: var(--v5-cobalt);
  background: rgba(63,109,246,0.1); padding: 1px 7px;
  flex-shrink: 0; margin-top: 2px;
}
/* Bug file refs */
.ps-bug-file {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.04em;
  color: var(--v5-rose); background: rgba(211,171,199,0.15);
  padding: 1px 6px;
}
.ps-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.08em;
  padding: 2px 7px; border-radius: 3px;
  display: inline-block;
}
</style>
</head>
<body data-page="project-status">
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback } = React;

/* ─── Tab definitions ─── */
const TABS = [
  { id: 'overview',    label: 'סקירה',                   sub: '01' },
  { id: 'map',         label: 'מפה — איפה כל קובץ',      sub: '02' },
  { id: 'fixes',       label: 'באגים שתוקנו',            sub: '03' },
  { id: 'editor',      label: 'עורך המאמרים',            sub: '04' },
  { id: 'sanity',      label: 'חיבור Sanity',            sub: '05' },
  { id: 'roadmap',     label: 'מה חסר',                   sub: '06' },
];

/* ─── URL-param tab persistence ─── */
function getInitialTab() {
  try {
    const p = new URLSearchParams(window.location.search);
    const t = p.get('tab');
    if (t && TABS.find(x => x.id === t)) return t;
  } catch (_) {}
  return 'overview';
}
function setTabParam(id) {
  try {
    const u = new URL(window.location.href);
    u.searchParams.set('tab', id);
    window.history.replaceState(null, '', u.toString());
  } catch (_) {}
}

/* ─── Hero ─── */
function Hero() {
  return (
    <header className="ps-hero">
      <div className="ps-hero-bg" />
      <div className="ps-hero-inner">
        <div className="ps-eyebrow">nVision AI · Variation E · Newsroom Workbench</div>
        <h1>
          <span className="serif">Project</span> Status
        </h1>
        <p className="ps-hero-sub">
          תמונת מצב — 15 במאי 2026 · עורך מאמרים · Sanity sync · Cloudflare Pages
        </p>
        <div style={{ display: 'flex', justifyContent: 'center' }}>
          <div className="ps-live-badge">
            <span className="ps-live-dot" />
            המערכת עובדת בלייב — Cloudflare Pages
          </div>
        </div>
      </div>
    </header>
  );
}

/* ─── Tab strip ─── */
function TabStrip({ active, onChange }) {
  return (
    <nav className="ps-tab-strip" role="tablist">
      {TABS.map(t => (
        <button
          key={t.id}
          role="tab"
          aria-selected={active === t.id}
          className={`ps-tab${active === t.id ? ' active' : ''}`}
          onClick={() => onChange(t.id)}
        >
          {t.label}
          <span className="mono">{t.sub}</span>
        </button>
      ))}
    </nav>
  );
}

/* ═══════════════════════════════
   TAB 1 — Overview
═══════════════════════════════ */
function TabOverview() {
  const stats = [
    { n: '5',  l: 'באגים קריטיים תוקנו', color: 'var(--v5-sage)' },
    { n: '700', l: 'שורות קוד — Editor', color: 'var(--v5-cobalt)' },
    { n: '3',   l: 'Pages Functions',    color: 'var(--v5-mustard)' },
    { n: '11',  l: 'סוגי בלוקים',        color: 'var(--v5-rose)' },
    { n: '1',   l: 'autosave · 1.5s',    color: 'var(--v5-acid)' },
  ];
  const timeline = [
    { time: '15.05 · בוקר', text: 'תוקן באג orphan call ל-V5CategoryPage שנמחק ב-commit da53a8e.' },
    { time: '15.05 · צהריים', text: 'תוקן useMemo undefined — alias useV5M לא כלל את useMemo, הוספה.' },
    { time: '15.05 · אחה"צ', text: 'תוקן SANITY_WRITE_TOKEN placeholder תמיד truthy — השוואה לערך ריאלי.' },
    { time: '15.05 · ערב', text: 'תוקן \'data-cat\': חסר key ב-V5HotBillboard — object literal שבור.' },
    { time: '15.05 · לילה', text: 'תוקן {literal}.concat() ב-V5Canvas — הוחלף ב-Object.assign().' },
  ];
  const next = [
    { n: 1, text: 'העלאת תמונות ל-Sanity Assets — כרגע רק URL paste. להוסיף files API endpoint.' },
    { n: 2, text: 'קריאת מאמרים מ-Sanity בחזרה לרשימה — list-articles.js מוכן, חסר ה-fetch בצד לקוח.' },
    { n: 3, text: 'הגדרת Sanity schema — ה-dataset עדיין לא מכיר את כל סוגי הבלוקים.' },
  ];

  return (
    <div>
      <div className="ps-big-status">
        <div className="ps-big-status-check">✓</div>
        <div>המערכת עובדת <span className="serif">בלייב</span></div>
      </div>

      <div className="ps-section-head">quick stats</div>
      <div className="ps-stats">
        {stats.map(s => (
          <div className="ps-stat" key={s.l} style={{ borderColor: s.color, boxShadow: `4px 4px 0 ${s.color}` }}>
            <div className="ps-stat-n" style={{ color: s.color }}>{s.n}</div>
            <div className="ps-stat-l">{s.l}</div>
          </div>
        ))}
      </div>

      <div className="ps-section-head">מה השתנה היום</div>
      <ul className="ps-timeline">
        {timeline.map((e, i) => (
          <li key={i}>
            <span className="ps-timeline-time">{e.time}</span>
            <span className="ps-timeline-text">{e.text}</span>
          </li>
        ))}
      </ul>

      <div className="ps-section-head">צעדים הבאים מיידיים</div>
      <ul className="ps-next-bullets">
        {next.map(item => (
          <li key={item.n}>
            <span className="ps-next-n">{item.n}</span>
            <span>{item.text}</span>
          </li>
        ))}
      </ul>
    </div>
  );
}

/* ═══════════════════════════════
   TAB 2 — Project Map
═══════════════════════════════ */
function TabMap() {
  const endpoints = [

function V5ProjectStatus() {
  const [tab, setTab] = useState(getInitialTab);

  const handleTab = useCallback((id) => {
    setTab(id);
    setTabParam(id);
  }, []);

  const content = {
    overview: <TabOverview />,
    map:      <TabMap />,
    fixes:    <TabFixes />,
    editor:   <TabEditor />,
    sanity:   <TabSanity />,
    roadmap:  <TabRoadmap />,
  };

  return (
    <div className="ps-root">
      <Hero />
      <TabStrip active={tab} onChange={handleTab} />
      <main className="ps-content">
        {content[tab] || <TabOverview />}
      </main>
    </div>
  );
}

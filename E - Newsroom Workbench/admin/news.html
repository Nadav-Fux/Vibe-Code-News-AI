<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>nVision Studio · חדשות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-shell">
  <header class="admin-top">
    <div class="admin-brand">
      <div class="admin-brand-mark">n.</div>
      <div class="admin-brand-name"><strong>nVision Studio</strong><span>VIBE CODE NEWS · STUDIO</span></div>
    </div>
    <div class="admin-top-right">
      <a href="../index.html">← חזרה לאתר</a>
      <a href="../news.html">לפיד הציבורי</a>
    </div>
  </header>
  <div class="admin-body">
    <nav class="admin-nav" data-admin-nav></nav>
    <main class="admin-main">
      <div class="admin-page-head">
        <div>
          <p class="eyebrow">CONTENT · NEWS</p>
          <h1>ידיעות</h1>
        </div>
        <div class="admin-page-actions">
          <button class="admin-btn is-primary" id="quick-news-btn" type="button">+ ידיעה מהירה</button>
        </div>
      </div>

      <div class="admin-placeholder" style="display:none" id="quick-news-form">
        <h3 style="margin-top:0">ידיעה מהירה</h3>
        <form id="quick-news" style="display:grid;gap:10px;max-width:640px">
          <label style="display:grid;gap:4px">
            <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">כותרת *</span>
            <input name="headline" required maxlength="140" style="padding:8px 10px;border:1px solid var(--admin-line-2);font-family:inherit;font-size:14px;background:var(--admin-bg)"/>
          </label>
          <label style="display:grid;gap:4px">
            <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">Slug (a-z, 0-9, מקפים) *</span>
            <input name="slug" required pattern="[a-z0-9][a-z0-9-]*" style="padding:8px 10px;border:1px solid var(--admin-line-2);font-family:'JetBrains Mono',monospace;font-size:13px;background:var(--admin-bg)"/>
          </label>
          <label style="display:grid;gap:4px">
            <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">Dek (משפט סיכום) *</span>
            <input name="dek" required maxlength="280" style="padding:8px 10px;border:1px solid var(--admin-line-2);font-family:inherit;font-size:14px;background:var(--admin-bg)"/>
          </label>
          <label style="display:grid;gap:4px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">גוף הידיעה (1-3 פסקאות) *</span>
              <button type="button" id="ai-format-btn" class="admin-btn" style="font-size:11.5px;padding:4px 10px">✨ סדר עם AI</button>
            </div>
            <textarea name="body" required maxlength="2400" rows="6" style="padding:8px 10px;border:1px solid var(--admin-line-2);font-family:inherit;font-size:14px;background:var(--admin-bg);resize:vertical"></textarea>
            <span id="ai-format-status" style="font-size:11.5px;color:var(--admin-dim);min-height:14px"></span>
          </label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <label style="display:grid;gap:4px">
              <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">קטגוריה</span>
              <select name="category" style="padding:8px 10px;border:1px solid var(--admin-line-2);font-family:inherit;font-size:14px;background:var(--admin-bg)">
                <option value="update">עדכון</option>
                <option value="breaking">דחוף</option>
                <option value="release">שחרור</option>
                <option value="analysis">ניתוח</option>
                <option value="rumor">שמועה</option>
                <option value="guide-short">מדריך קצר</option>
              </select>
            </label>
            <label style="display:grid;gap:4px">
              <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">דחיפות</span>
              <select name="urgency" style="padding:8px 10px;border:1px solid var(--admin-line-2);font-family:inherit;font-size:14px;background:var(--admin-bg)">
                <option value="normal">רגיל</option>
                <option value="low">נמוך</option>
                <option value="high">גבוה</option>
                <option value="breaking">פריצה</option>
              </select>
            </label>
          </div>
          <div style="display:flex;gap:14px;font-size:13px;align-items:center;padding:8px 0">
            <span style="font-size:11px;letter-spacing:0.1em;color:var(--admin-dim);text-transform:uppercase">ערוצים:</span>
            <label><input type="checkbox" name="ch_web" checked/> Web</label>
            <label><input type="checkbox" name="ch_telegram"/> Telegram (Phase 2)</label>
            <label><input type="checkbox" name="ch_whatsapp"/> WhatsApp (Phase 2)</label>
          </div>
          <div style="display:flex;gap:8px;margin-top:6px">
            <button type="submit" class="admin-btn is-primary">שמור ופרסם</button>
            <button type="button" class="admin-btn" id="quick-news-cancel">בטל</button>
          </div>
          <p id="quick-news-status" style="margin:6px 0 0;font-size:12.5px;color:var(--admin-dim)"></p>
        </form>
      </div>

      <div class="admin-table-wrap" id="news-table-wrap">
        <div class="admin-empty">טוען ידיעות...</div>
      </div>
    </main>
  </div>
</div>
<script src="admin.js"></script>
<script>
  (async function () {
    var wrap = document.getElementById('news-table-wrap');
    async function load() {
      try {
        var data = await AdminShell.loadList('/api/list-news');
        var list = data.news || [];
        if (!list.length) {
          wrap.innerHTML = '<div class="admin-empty">לא נמצאו ידיעות. השתמש ב<strong>+ ידיעה מהירה</strong>.</div>';
          return;
        }
        var rows = list.map(function (n) {
          var slug = n.slug || '';
          var chs = (n.channels || []).join(', ');
          var urgKind = n.urgency === 'breaking' ? 'breaking' : n.urgency === 'high' ? 'high' : '';
          return '<tr>'
            + '<td>' + AdminShell.escapeHtml(n.headline || '') + '</td>'
            + '<td>' + AdminShell.pill(n.category || 'update') + '</td>'
            + '<td>' + AdminShell.pill(n.urgency || 'normal', urgKind) + '</td>'
            + '<td><code style="font-size:11px">' + AdminShell.escapeHtml(chs) + '</code></td>'
            + '<td>' + AdminShell.fmtTime(n.publishedAt || n._updatedAt) + '</td>'
            + '<td class="admin-row-actions">'
            + '<a class="admin-btn" href="../news.html#' + encodeURIComponent(slug) + '" target="_blank">פיד</a>'
            + '<button class="admin-btn is-danger" data-delete="' + AdminShell.escapeHtml(slug) + '">מחק</button>'
            + '</td>'
            + '</tr>';
        }).join('');
        wrap.innerHTML = '<table class="admin-table">'
          + '<thead><tr><th>כותרת</th><th>קטגוריה</th><th>דחיפות</th><th>ערוצים</th><th>פורסם</th><th></th></tr></thead>'
          + '<tbody>' + rows + '</tbody></table>';
        wrap.querySelectorAll('[data-delete]').forEach(function (btn) {
          btn.addEventListener('click', async function () {
            var s = btn.getAttribute('data-delete');
            if (!confirm('למחוק את "' + s + '"?')) return;
            try {
              await AdminShell.deleteBySlug('/api/delete-news', s);
              load();
            } catch (e) { alert('Delete failed: ' + e.message); }
          });
        });
      } catch (e) {
        wrap.innerHTML = '<div class="admin-empty">שגיאה: ' + AdminShell.escapeHtml(e.message) + '</div>';
      }
    }
    load();

    var form = document.getElementById('quick-news-form');
    document.getElementById('quick-news-btn').addEventListener('click', function () {
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('ai-format-btn').addEventListener('click', async function () {
      var statusEl = document.getElementById('ai-format-status');
      var formEl = document.getElementById('quick-news');
      var rawParts = [];
      ['headline', 'dek', 'body'].forEach(function (k) {
        var v = formEl.elements[k] && formEl.elements[k].value;
        if (v && v.trim()) rawParts.push(v.trim());
      });
      var rawText = rawParts.join('\n\n');
      if (rawText.length < 20) {
        statusEl.textContent = '⚠ הקלד לפחות 20 תווים (אפשר בכותרת/dek/גוף ביחד) ואז לחץ שוב.';
        return;
      }
      var secret = AdminShell.getSecret();
      if (!secret) {
        var supplied = window.prompt('הזן EDITOR_SECRET (פעם אחת, נשמר ב-localStorage):');
        if (!AdminShell.setSecret(supplied)) { statusEl.textContent = 'בוטל.'; return; }
        secret = AdminShell.getSecret();
      }
      statusEl.textContent = '⏳ מבקש מ-Groq לסדר...';
      try {
        var res = await fetch('/api/ai-format', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Editor-Secret': secret },
          body: JSON.stringify({ rawText: rawText, mode: 'news' }),
        });
        var j = await res.json().catch(function () { return {}; });
        if (!res.ok || !j.ok) throw new Error((j && (j.error || j.message)) || res.status);
        var d = j.data || {};
        if (d.headline) formEl.elements['headline'].value = d.headline;
        if (d.slug && !formEl.elements['slug'].value) formEl.elements['slug'].value = d.slug;
        if (d.dek) formEl.elements['dek'].value = d.dek;
        if (d.body) formEl.elements['body'].value = d.body;
        if (d.category) formEl.elements['category'].value = d.category;
        if (d.urgency) formEl.elements['urgency'].value = d.urgency;
        statusEl.textContent = '✓ סודר עם ' + (j.provider || 'groq') + ' — בדוק לפני שמירה.';
      } catch (err) {
        statusEl.textContent = '⚠ ' + err.message;
      }
    });
    document.getElementById('quick-news-cancel').addEventListener('click', function () {
      form.style.display = 'none';
    });
    document.getElementById('quick-news').addEventListener('submit', async function (ev) {
      ev.preventDefault();
      var fd = new FormData(ev.target);
      var channels = [];
      if (fd.get('ch_web')) channels.push('web');
      if (fd.get('ch_telegram')) channels.push('telegram');
      if (fd.get('ch_whatsapp')) channels.push('whatsapp');
      var body = {
        headline: fd.get('headline'),
        slug: fd.get('slug'),
        dek: fd.get('dek'),
        body: fd.get('body'),
        category: fd.get('category'),
        urgency: fd.get('urgency'),
        channels: channels,
      };
      var statusEl = document.getElementById('quick-news-status');
      statusEl.textContent = 'שומר...';
      var secret = AdminShell.getSecret();
      if (!secret) {
        var supplied = window.prompt('הזן EDITOR_SECRET (פעם אחת, נשמר ב-localStorage):');
        if (!AdminShell.setSecret(supplied)) {
          statusEl.textContent = 'בוטל — נדרש EDITOR_SECRET.';
          return;
        }
        secret = AdminShell.getSecret();
      }
      try {
        var res = await fetch('/api/save-news', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Editor-Secret': secret },
          body: JSON.stringify(body),
        });
        var j = await res.json().catch(function () { return {}; });
        if (!res.ok) throw new Error((j && j.error) || res.status);
        statusEl.textContent = '✓ ' + (j.action || 'נשמר');
        ev.target.reset();
        form.style.display = 'none';
        load();
      } catch (err) {
        statusEl.textContent = '⚠ ' + err.message;
      }
    });
  })();
</script>
</body>
</html>
